<!DOCTYPE html>
<html>
<head>
    <title>My Birthday Countdown Checker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ffecd2, #c49ffc);
            color: #3b2f2f;
            text-align: center;
        }
        .birthday-card {
            width: 520px;
            background-color: white;
            border: 4px solid #b06fff;
            border-radius: 20px;
            margin: 40px auto;
            padding: 25px;
            box-shadow: 0 0 20px #cd8fff;
        }
        h1 {
            color: #b247ff;
            font-size: 34px;
        }
        .emoji {
            font-size: 60px;
        }
        .input-box {
            margin: 20px 0;
        }
        input[type="date"] {
            padding: 10px;
            font-size: 16px;
            border: 2px solid #b06fff;
            border-radius: 10px;
            outline: none;
            color: #3b2f2f;
        }
        .info-box {
            background-color: #fff0f5;
            border: 2px dashed #cf6fff;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            text-align: left;
        }
        button {
            background-color: #9747ff;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 12px 25px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover {
            background-color: #8d33d6;
        }

        #daysBox {
            font-size: 42px;
            font-weight: bold;
            color: #7209b7;
        }
        #result {
            font-size: 17px;
            line-height: 1.6;
        }
        #countdown {
            color: #8d47ff;
            font-weight: bold;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="birthday-card">
        <div class="emoji">🎂</div>
        <h1>My Birthday Countdown Checker</h1>
        <p>Select your birthday below to calculate the countdown!</p>
        <div class="input-box">
            <input type="date" id="birthdayInput">
            <br>
            <button onclick="checkBirthday()">Check Birthday Countdown</button>
        </div>
        <h2>Days Left</h2>
        <div id="daysBox">?</div>
        <div class="info-box">
            <h2>Birthday Result</h2>
            <p id="result">Please select your birthday above.</p>
        </div>
        <div class="info-box">
            <h2>Countdown Review</h2>
            <p id="countdown">Waiting for date selection...</p>
        </div>
    </div>
    <script>
        function checkBirthday() {
            let inputDateStr = document.getElementById("birthdayInput").value;
            if (!inputDateStr) {
                alert("Please select a valid date first!");
                return;
            }
            let selectedDate = new Date(inputDateStr);
            const birthdayMonth = selectedDate.getMonth() + 1; 
            const birthdayDate = selectedDate.getDate();
            let birthdayGift = null;
            let birthdayPlan;
            const studentName = "User";
            let message = "";
            let countdownText = "";
            let today = new Date();
            let todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate());
            let currentYear = today.getFullYear();
            let birthday = new Date(currentYear, birthdayMonth - 1, birthdayDate);
            if (birthday < todayMidnight) {
                birthday = new Date(currentYear + 1, birthdayMonth - 1, birthdayDate);
            }
            let timeDifference = birthday - todayMidnight;
            let daysLeft = Math.ceil(timeDifference / (1000 * 60 * 60 * 24));
            if (daysLeft === 0) {
                message = "Happy Birthday, " + studentName + "! Today is your special day!";
            } else if (daysLeft <= 7) {
                message = "Your birthday is almost here, " + studentName + "!";
            } else {
                message = "Keep counting, " + studentName + " ! Your birthday is coming soon.";
            }
            let finalMessage = "User Profile Name: " + studentName + "<br>";
            finalMessage = finalMessage + "Today's Date: " + today.toDateString() + "<br>";
            finalMessage = finalMessage + "Next Birthday: " + birthday.toDateString() + "<br>";
            finalMessage = finalMessage + "Status Message: " + message + "<br><br>";
            finalMessage = finalMessage + "Birthday Gift Tracking: " + birthdayGift + "<br>";
            finalMessage = finalMessage + "Birthday Plan Status: " + birthdayPlan;
            document.getElementById("daysBox").innerHTML = daysLeft;
            document.getElementById("result").innerHTML = finalMessage;
            let dayCounter = 1;
            while (dayCounter <= 5) {
                let targetDay = new Date(todayMidnight);
                targetDay.setDate(todayMidnight.getDate() + dayCounter);
                let dynamicTimeDiff = birthday - targetDay;
                let dynamicDaysLeft = Math.ceil(dynamicTimeDiff / (1000 * 60 * 60 * 24));
                countdownText = countdownText + "In " + dayCounter + " day(s) (" + targetDay.toLocaleDateString() + "): ";
                if (dynamicDaysLeft === 0) {
                    countdownText = countdownText + "🎉 The Big Day Arrives! 🎉<br>";
                } else if (dynamicDaysLeft < 0) {
                    countdownText = countdownText + "Party mode activated!<br>";
                } else {
                    countdownText = countdownText + dynamicDaysLeft + " days remaining...<br>";
                }
                dayCounter++;
            }
            document.getElementById("countdown").innerHTML = countdownText;
        }
        window.onload = function () {
            let today = new Date();
            let day = String(today.getDate()).padStart(2, '0');
            let month = String(today.getMonth() + 1).padStart(2, '0');
            let year = today.getFullYear();
            document.getElementById("birthdayInput").value = `${year}-${month}-${day}`;
        };
    </script>
</body>
</html>
